name: World Engine CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [20.x, 22.x]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - name: Show environment
        run: |
          node --version
          npm --version
      - name: Run complete test suite
        run: |
          set -o pipefail
          npm test 2>&1 | tee system-contract-test-output.txt
      - name: Upload contract test output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: system-contract-test-output-${{ matrix.node-version }}
          path: system-contract-test-output.txt

  stress:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
      - name: Run 1000 tick stability test
        run: npm run stress
