name: World Engine CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test-node-20:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Show environment
        run: |
          node --version
          npm --version
      - name: Run complete test suite
        run: |
          mkdir -p world-engine/output/ci
          npm test 2>&1 | tee world-engine/output/ci/node20.log
      - name: Upload Node 20 logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: world-engine-ci-node20-logs
          path: world-engine/output/ci/node20.log

  test-node-22:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Show environment
        run: |
          node --version
          npm --version
      - name: Run complete test suite
        run: |
          mkdir -p world-engine/output/ci
          npm test 2>&1 | tee world-engine/output/ci/node22.log
      - name: Upload Node 22 logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: world-engine-ci-node22-logs
          path: world-engine/output/ci/node22.log

  stress:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Run 1000 tick stability test
        run: npm run stress
