name: World Engine CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [20.x, 22.x]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - name: Show environment
        run: |
          node --version
          npm --version
      - name: Run complete test suite
        run: npm test
      - name: Upload deterministic purity findings
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: deterministic-purity-findings-${{ matrix.node-version }}
          path: /tmp/deterministic-purity-findings.json
          if-no-files-found: ignore
      - name: Upload core source snapshot
        if: matrix.node-version == '22.x'
        uses: actions/upload-artifact@v4
        with:
          name: core-source-snapshot
          path: world-engine/core

  stress:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
      - name: Run 1000 tick stability test
        run: npm run stress
