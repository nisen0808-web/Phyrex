name: World Engine Tests

on:
  push:
    paths:
      - 'world-engine/**'
      - 'package.json'
      - '.github/workflows/world-engine-tests.yml'
  pull_request:
    paths:
      - 'world-engine/**'
      - 'package.json'
      - '.github/workflows/world-engine-tests.yml'
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Root npm test
        run: npm test

      - name: World engine npm test
        working-directory: world-engine
        run: npm test

      - name: Direct fast stability test
        run: node world-engine/tests/stability-100-test.js
