<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>BTC现货ETF控制台</title><style>:root{--ink:#101827;--muted:#667085;--line:#e5eaf2;--green:#069668;--red:#dc2f55;--shadow:0 12px 32px rgba(16,24,40,.06)}*{box-sizing:border-box}body{margin:0;background:linear-gradient(180deg,#f2f6ff 0,#f8fafc 38%,#fff 100%);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans SC","Microsoft YaHei",Arial,sans-serif}.wrap{width:min(1720px,calc(100% - 28px));margin:auto;padding:20px 0 42px}.hero{display:grid;grid-template-columns:420px 1fr;gap:18px;margin-bottom:16px}.card{background:rgba(255,255,255,.96);border:1px solid var(--line);border-radius:22px;box-shadow:var(--shadow);overflow:hidden}.head{padding:22px 24px}.tag{display:inline-flex;padding:6px 10px;border-radius:999px;background:#eef6ff;border:1px solid #cfe4ff;color:#1d4ed8;font-size:12px;font-weight:850}.title{font-size:36px;line-height:1.05;margin:12px 0 0;letter-spacing:-.04em}.stats{padding:14px;display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px}.stat{background:linear-gradient(180deg,#fff,#f9fbff);border:1px solid var(--line);border-radius:18px;padding:14px 16px}.label{font-size:12px;color:var(--muted);margin-bottom:7px}.value{font-size:22px;font-weight:900;font-variant-numeric:tabular-nums}.good{color:var(--green);font-weight:900}.bad{color:var(--red);font-weight:900}.neutral{color:#344054}.toolbar{display:grid;grid-template-columns:1fr 130px 220px 118px;gap:10px;margin-bottom:16px;padding:12px}input,select,button{height:42px;border-radius:13px;border:1px solid var(--line);background:#fff;color:var(--ink);padding:0 13px;outline:none;font-size:14px}input:focus,select:focus{border-color:#9cc6ff;box-shadow:0 0 0 3px rgba(37,99,235,.12)}button{border:0;background:linear-gradient(135deg,#0f766e,#2563eb);color:#fff;font-weight:850;cursor:pointer}.mainGrid{display:grid;grid-template-columns:1.35fr .65fr;gap:18px;margin-bottom:18px}.sectionHead{display:flex;justify-content:space-between;gap:14px;align-items:flex-start;padding:18px 20px 0}.sectionTitle{font-size:18px;font-weight:900}.pill{display:inline-flex;border-radius:999px;background:#f2f4f7;border:1px solid var(--line);padding:5px 10px;color:#475467;font-size:12px;white-space:nowrap}.chart{height:330px;padding:8px 18px 18px}.flowBox{padding:12px 18px 20px}.flowTitle{margin:8px 0 10px;font-size:13px;color:var(--muted);font-weight:800}.flowRow{display:grid;grid-template-columns:58px 1fr 128px;gap:10px;align-items:center;padding:9px 0;border-bottom:1px solid #eef2f6;font-size:13px}.flowRow:last-child{border-bottom:0}.ticker{display:inline-flex;min-width:54px;justify-content:center;padding:5px 9px;border-radius:10px;background:#edf6ff;border:1px solid #cfe4ff;color:#1d4ed8;font-weight:900}.barBg{height:9px;background:#edf2f7;border-radius:999px;overflow:hidden}.barFill{height:100%;border-radius:999px;background:linear-gradient(90deg,#60a5fa,#0f766e)}.barFill.neg{background:linear-gradient(90deg,#fb7185,#fda4af)}.tableWrap{overflow:auto;max-height:680px}table{width:100%;min-width:1660px;border-collapse:collapse}th,td{padding:13px 16px;border-bottom:1px solid var(--line);font-size:13px;text-align:left;white-space:nowrap}th{position:sticky;top:0;background:#f8fafc;color:#475467;z-index:2;font-weight:850}tbody tr:hover{background:#fbfdff}td.num,th.num{text-align:right;font-variant-numeric:tabular-nums}.footer{margin-top:12px;color:var(--muted);font-size:12px;line-height:1.7}@media(max-width:1200px){.hero,.mainGrid{grid-template-columns:1fr}.stats{grid-template-columns:repeat(2,1fr)}}@media(max-width:760px){.wrap{width:min(100% - 16px,1720px)}.toolbar{grid-template-columns:1fr}.stats{grid-template-columns:1fr}input,select,button{width:100%}.title{font-size:30px}}</style></head><body><main class="wrap"><section class="hero"><div class="card head"><span class="tag">BTC Spot ETF Console</span><h1 class="title">BTC现货ETF控制台</h1></div><div class="card stats" id="stats"></div></section><section class="card toolbar"><input id="q" placeholder="搜索 ETF、发行方、代码，例如 IBIT / BlackRock"><select id="period"><option value="d1">1D</option><option value="w">周</option><option value="m">月</option><option value="q">季度</option><option value="y">年</option></select><select id="sort"><option value="latestDesc">最新持仓从大到小</option><option value="deltaDesc">周期净流入从大到小</option><option value="deltaAsc">周期净流出从大到小</option><option value="pctDesc">周期变化率从大到小</option><option value="tickerAsc">代码排序</option></select><button id="exportBtn">导出 CSV</button></section><section class="mainGrid"><div class="card"><div class="sectionHead"><div class="sectionTitle">总持仓趋势</div><span class="pill" id="trendPill"></span></div><div class="chart" id="totalChart"></div></div><div class="card"><div class="sectionHead"><div class="sectionTitle">周期资金变化</div><span class="pill" id="periodTotal"></span></div><div class="flowBox"><div class="flowTitle">净流入</div><div id="inflows"></div><div class="flowTitle">净流出</div><div id="outflows"></div></div></div></section><section class="card"><div class="sectionHead"><div class="sectionTitle">ETF 主查询表</div><span class="pill" id="countPill"></span></div><div class="tableWrap"><table id="tbl"><thead><tr><th>ETF</th><th>发行方</th><th>最新日期</th><th class="num">最新持仓 BTC</th><th class="num">占比</th><th class="num">1D</th><th class="num">1D%</th><th class="num">周</th><th class="num">周%</th><th class="num">月</th><th class="num">月%</th><th class="num">季度</th><th class="num">季度%</th><th class="num">年</th><th class="num">年%</th></tr></thead><tbody></tbody></table></div></section><div class="footer">数据来源：用户上传 Excel《数据.xlsx》中的「BTC现货ETF」工作表。DEFI 因原始表格停更，按最新可见持仓保留，不按归零处理。</div></main><script>const DATA={"latestDate":"2026-05-20","rows":[{"ticker":"GBTC","name":"Grayscale（灰度）","latestDate":"2026-05-20","latest":148699.3103,"d1":-6.1112,"d1Pct":-0.00411,"w":-983.1523,"wPct":-0.656825,"m":-3847.2186,"mPct":-2.521997,"q ct":-8.232135,"q":-61.71,"qPct":-1.051036,"y":712.17,"yPct":13.971048},{"ticker":"DEFI","name":"Hashdex Bitcoin ETF","latestDate":"2025-09-19","latest":178,"d1":0,"d1Pct":0,"w":0,"wPct":0,"m":0,"mPct":0,"q":0,"qPct":0,"y":0,"yPct":0},{"ticker":"MSBT","name":"Morgan Stanley（摩根士丹利）","latestDate":"2026-05-20","latest":3486.12,"d1":14.33,"d1Pct":0.412755,"w":97.33,"wPct":2.872117,"m":1559.437,"mPct":80.938951,"q":null,"qPct":null,"y":null,"yPct":null},{"ticker":"BTCW","name":"WisdomTree（美国）","latestDate":"2026-05-20","latest":1595,"d1":0,"d1Pct":0,"w":0,"wPct":0,"m":0,"mPct":0,"q":0,"qPct":0,"y":48,"yPct":3.10278}],"total":{"latestDate":"2026-05-20","latest":1304236.3405,"d1":-785.2984,"d1Pct":-0.060175,"w":-15711.2354,"wPct":-1.190292,"m":-10078.5647,"mPct":-0.76683,"q":45382.7976,"qPct":3.60509,"y":113586.1555,"yPct":9.539843}};let rows=DATA.rows.map(r=>({...r,share:r.latest/DATA.total.latest}));const $=id=>document.getElementById(id),fmt=n=>n==null?'—':Number(n).toLocaleString('en-US',{maximumFractionDigits:2}),pct=n=>n==null?'—':(n>0?'+':'')+Number(n).toFixed(2)+'%',cls=n=>n==null||n===0?'neutral':n>0?'good':'bad',PM={d1:['1D','d1','d1Pct'],w:['周','w','wPct'],m:['月','m','mPct'],q:['季度','q','qPct'],y:['年','y','yPct']};function prev(v,d){return v==null||d==null?null:v-d}function pts(o){return [['年初',prev(o.latest,o.y)],['季度前',prev(o.latest,o.q)],['月前',prev(o.latest,o.m)],['周前',prev(o.latest,o.w)],['昨日',prev(o.latest,o.d1)],['最新',o.latest]].filter(x=>x[1]!=null)}function line(el,a){const w=1080,h=310,p=40,vs=a.map(x=>x[1]),mn=Math.min(...vs),mx=Math.max(...vs),sp=mx-mn||1,x=i=>p+i*(w-2*p)/(a.length-1||1),y=v=>h-p-(v-mn)*(h-2*p)/sp,path=a.map((d,i)=>(i?'L':'M')+x(i)+','+y(d[1])).join(' '),area=path+` L ${x(a.length-1)},${h-p} L ${x(0)},${h-p} Z`;el.innerHTML=`<svg viewBox="0 0 ${w} ${h}" width="100%" height="100%"><defs><linearGradient id="g" x1="0" x2="0" y1="0" y2="1"><stop offset="0" stop-color="#bae6fd" stop-opacity=".55"/><stop offset="1" stop-color="#bae6fd" stop-opacity="0"/></linearGradient></defs><path d="${area}" fill="url(#g)"/><path d="${path}" fill="none" stroke="#0f766e" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>${a.map((d,i)=>`<circle cx="${x(i)}" cy="${y(d[1])}" r="4" fill="#2563eb"/>`).join('')}${a.map((d,i)=>`<text x="${x(i)}" y="${h-10}" fill="#667085" font-size="13" text-anchor="middle">${d[0]}</text>`).join('')}<text x="${p}" y="22" fill="#667085" font-size="12">${fmt(mx)} BTC</text><text x="${p}" y="${h-p-8}" fill="#667085" font-size="12">${fmt(mn)} BTC</text></svg>`}function renderStats(){let t=DATA.total;$('stats').innerHTML=[['美国 ETF 数量',rows.length],['最新日期',DATA.latestDate],['总持仓 BTC',fmt(t.latest)],['1D',`<span class="${cls(t.d1)}">${fmt(t.d1)} / ${pct(t.d1Pct)}</span>`],['周变化',`<span class="${cls(t.w)}">${fmt(t.w)} / ${pct(t.wPct)}</span>`],['月变化',`<span class="${cls(t.m)}">${fmt(t.m)} / ${pct(t.mPct)}</span>`],['季度变化',`<span class="${cls(t.q)}">${fmt(t.q)} / ${pct(t.qPct)}</span>`],['年变化',`<span class="${cls(t.y)}">${fmt(t.y)} / ${pct(t.yPct)}</span>`]].map(x=>`<div class="stat"><div class="label">${x[0]}</div><div class="value">${x[1]}</div></div>`).join('')}function flowRows(el,a,dk,pk){let mx=Math.max(1,...a.map(x=>Math.abs(x[dk]||0)));el.innerHTML=a.map(r=>`<div class="flowRow"><span class="ticker">${r.ticker}</span><div class="barBg"><div class="barFill ${(r[dk]||0)<0?'neg':''}" style="width:${Math.max(2,Math.abs(r[dk]||0)/mx*100)}%"></div></div><div class="${cls(r[dk])}" style="text-align:right">${fmt(r[dk])} / ${pct(r[pk])}</div></div>`).join('')}function filtered(){let q=$('q').value.trim().toLowerCase(),p=$('period').value,[,dk,pk]=PM[p],out=rows.filter(r=>(r.ticker+' '+r.name).toLowerCase().includes(q)),s=$('sort').value;out.sort((a,b)=>s==='latestDesc'?b.latest-a.latest:s==='deltaDesc'?(b[dk]??-1e99)-(a[dk]??-1e99):s==='deltaAsc'?(a[dk]??1e99)-(b[dk]??1e99):s==='pctDesc'?(b[pk]??-1e99)-(a[pk]??-1e99):a.ticker.localeCompare(b.ticker));return out}function renderFlows(){let p=$('period').value,[label,dk,pk]=PM[p],valid=rows.filter(r=>r[dk]!=null),pos=valid.filter(r=>r[dk]>0).sort((a,b)=>b[dk]-a[dk]).slice(0,5),neg=valid.filter(r=>r[dk]<0).sort((a,b)=>a[dk]-b[dk]).slice(0,5);$('periodTotal').innerHTML=`${label}合计 <span class="${cls(DATA.total[dk])}">${fmt(DATA.total[dk])}</span>`;flowRows($('inflows'),pos,dk,pk);flowRows($('outflows'),neg,dk,pk)}function renderTable(){let out=filtered(),p=$('period').value,[label,dk]=PM[p],sum=out.reduce((s,r)=>s+(Number.isFinite(r[dk])?r[dk]:0),0);$('countPill').innerHTML=`${out.length} 条｜${label}合计 <span class="${cls(sum)}">${fmt(sum)}</span>`;$('tbl').querySelector('tbody').innerHTML=out.map(r=>`<tr><td><span class="ticker">${r.ticker}</span></td><td><b>${r.name}</b></td><td>${r.latestDate}</td><td class="num">${fmt(r.latest)}</td><td class="num">${pct(r.share*100)}</td><td class="num ${cls(r.d1)}">${fmt(r.d1)}</td><td class="num ${cls(r.d1Pct)}">${pct(r.d1Pct)}</td><td class="num ${cls(r.w)}">${fmt(r.w)}</td><td class="num ${cls(r.wPct)}">${pct(r.wPct)}</td><td class="num ${cls(r.m)}">${fmt(r.m)}</td><td class="num ${cls(r.mPct)}">${pct(r.mPct)}</td><td class="num ${cls(r.q)}">${fmt(r.q)}</td><td class="num ${cls(r.qPct)}">${pct(r.qPct)}</td><td class="num ${cls(r.y)}">${fmt(r.y)}</td><td class="num ${cls(r.yPct)}">${pct(r.yPct)}</td></tr>`).join('')}function csv(){let h=['ticker','name','latestDate','latestBTC','share','1D','1D%','week','week%','month','month%','quarter','quarter%','year','year%'],lines=[h.join(',')].concat(rows.map(r=>[r.ticker,r.name,r.latestDate,r.latest,r.share,r.d1,r.d1Pct,r.w,r.wPct,r.m,r.mPct,r.q,r.qPct,r.y,r.yPct].map(v=>'"'+String(v??'').replaceAll('"','""')+'"').join(',')));let b=new Blob(['\ufeff'+lines.join('\n')],{type:'text/csv;charset=utf-8'}),a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='us-btc-spot-etf-dashboard.csv';a.click();URL.revokeObjectURL(a.href)}function render(){renderStats();$('trendPill').textContent=DATA.latestDate;line($('totalChart'),pts(DATA.total));renderFlows();renderTable()}['q','period','sort'].forEach(id=>$(id).addEventListener('input',render));$('exportBtn').onclick=csv;render();</script></body></html>
