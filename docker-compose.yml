services:
  world-engine:
    build:
      context: .
    image: phyrex-world-engine:1.0.0
    restart: unless-stopped
    env_file:
      - .env.production
    ports:
      - "8790:8790"
    volumes:
      - phyrex-data:/data
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    stop_grace_period: 20s

volumes:
  phyrex-data:
