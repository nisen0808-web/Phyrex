<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MUD Xianxia World</title>
  <link rel="stylesheet" href="./style.css" />
  <link rel="stylesheet" href="./map.css" />
  <link rel="stylesheet" href="./relations.css" />
  <link rel="stylesheet" href="./v1.css" />
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div>
        <h1>MUD 修仙世界</h1>
        <p>浏览器本地原型 · 世界只在你手动推演时前进 · 不会因为现实离线自动老死</p>
      </div>
      <div class="top-actions">
        <button id="btnSave">保存</button>
        <button id="btnReset" class="danger">重新开始</button>
      </div>
    </header>

    <section class="world-panel card">
      <div class="world-main">
        <div class="world-date" id="worldDate">第 1 年 春 第 1 日 白天</div>
        <div class="world-sub" id="worldSub">存活 9 人，死亡 0 人，长期命令 0 条</div>
      </div>
      <div class="world-controls">
        <button id="btnTick">推演一天</button>
        <button id="btnTick10">推演十天</button>
        <button id="btnOffline">推演三十天</button>
      </div>
    </section>

    <main class="game-shell">
      <aside class="left-map-column">
        <section class="card world-log-card">
          <h2>世界日志 <span>· 身边信息</span></h2>
          <div id="logList" class="log-list"></div>
        </section>
        <section class="card map-card">
          <h2>世界地图 <span class="help-dot">?</span></h2>
          <div class="map-actions"><button>缩小</button><div class="zoom-line"><i></i></div><button>放大</button><button>当前位置</button></div>
          <div id="worldMap" class="world-map"></div>
          <div id="locationLegend" class="location-legend"></div>
        </section>
      </aside>

      <section class="center-story-column">
        <section class="card scene-card">
          <h2>当前场景</h2>
          <div id="scenePanel" class="scene-panel">
            <div class="scene-title">新手村</div>
            <p>你从昏迷中醒来，发现自己躺在一间破旧的草屋里。这里是中州边缘的一个小村庄，依山傍水，民风淳朴。</p>
          </div>
        </section>

        <section class="card player-card-panel">
          <h2>玩家信息</h2>
          <div id="playerCard" class="character-card"></div>
        </section>

        <section class="card command-card">
          <h2>下达长期命令</h2>
          <div class="form-row"><label for="actionSelect">行动</label><select id="actionSelect"><option value="cultivate">修炼</option><option value="meditate">打坐</option><option value="work">赚钱</option><option value="explore">探索</option><option value="socialize">社交</option><option value="askItem">索要物品</option><option value="inviteTeam">邀请组队</option><option value="ambush">偷袭</option></select></div>
          <div class="form-row"><label for="targetSelect">目标</label><select id="targetSelect"></select></div>
          <div class="form-row"><label for="daysInput">持续天数</label><input id="daysInput" type="number" min="1" max="365" value="7" /></div>
          <button id="btnAssign" class="primary">下达命令</button>
          <p class="hint">命令只会在你手动推演世界时间时结算。睡觉、关闭浏览器、电脑关机，都不会自动推进寿命。</p>
        </section>

        <section class="card order-card">
          <h2>当前命令</h2>
          <div id="ordersList" class="orders-list"></div>
        </section>
      </section>

      <aside class="right-contact-column">
        <section class="card relation-sidebar">
          <h2>人物关系</h2>
          <div class="side-tabs"><button>全部</button><button>熟人</button><button>陌生</button><button>敌人</button></div>
          <div id="relationsGrid" class="relations-grid contact-list"></div>
        </section>
        <section class="card npc-sidebar-card">
          <h2>NPC 列表</h2>
          <div class="side-tabs"><button>全部</button><button>村庄</button><button>门派</button><button>城镇</button><button>其他</button></div>
          <div id="npcList" class="npc-list"></div>
        </section>
      </aside>
    </main>
  </div>

  <script src="./game.js"></script>
  <script src="./relations.js"></script>
  <script src="./profile.js"></script>
  <script src="./v1-ui.js"></script>
</body>
</html>
