<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MUD Xianxia World</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div>
        <h1>MUD 修仙世界</h1>
        <p>浏览器本地原型 · 不需要 Python · 双击 index.html 可运行</p>
      </div>
      <div class="top-actions">
        <button id="btnSave">保存</button>
        <button id="btnReset" class="danger">重开世界</button>
      </div>
    </header>

    <section class="world-panel card">
      <div class="world-main">
        <div class="world-date" id="worldDate">第 1 年 春 第 1 日</div>
        <div class="world-sub" id="worldSub">世界正在等待第一道命令。</div>
      </div>
      <div class="world-controls">
        <button id="btnTick">推进一天</button>
        <button id="btnTick10">推进十天</button>
        <button id="btnOffline">模拟离线30天</button>
      </div>
    </section>

    <main class="grid">
      <section class="card">
        <h2>玩家</h2>
        <div id="playerCard" class="character-card"></div>
      </section>

      <section class="card">
        <h2>下达命令</h2>
        <div class="form-row">
          <label for="actionSelect">行动</label>
          <select id="actionSelect">
            <option value="cultivate">修炼</option>
            <option value="meditate">打坐</option>
            <option value="work">赚钱</option>
            <option value="explore">探索</option>
            <option value="socialize">社交</option>
            <option value="askItem">索要物品</option>
            <option value="inviteTeam">邀请组队</option>
            <option value="ambush">偷袭</option>
          </select>
        </div>
        <div class="form-row">
          <label for="targetSelect">目标</label>
          <select id="targetSelect"></select>
        </div>
        <div class="form-row">
          <label for="daysInput">持续天数</label>
          <input id="daysInput" type="number" min="1" max="365" value="7" />
        </div>
        <button id="btnAssign" class="primary">下达离线命令</button>
        <p class="hint">越危险的行动收益越高，但也越可能受伤或死亡。高情感值更容易组队和求助，也更容易被偷袭成功。</p>
      </section>

      <section class="card span-2">
        <h2>当前命令</h2>
        <div id="ordersList" class="orders-list"></div>
      </section>

      <section class="card span-2">
        <h2>人物关系</h2>
        <div id="relationsGrid" class="relations-grid"></div>
      </section>

      <section class="card span-2">
        <h2>NPC</h2>
        <div id="npcList" class="npc-list"></div>
      </section>

      <section class="card span-2">
        <h2>世界日志</h2>
        <div id="logList" class="log-list"></div>
      </section>
    </main>
  </div>

  <script src="./game.js"></script>
</body>
</html>
